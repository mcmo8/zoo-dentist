<!doctype html><html><head><meta charset=utf-8><style>
body{margin:0;background:#7a1030;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:system-ui;color:#fff;gap:18px}
#scene{position:relative;width:240px;height:240px}
.tooth{position:absolute;left:70px;top:60px;width:100px}
#cav{transition:opacity .15s}#fill{opacity:0;transition:opacity .25s}
.shake{animation:sh .08s linear infinite}
@keyframes sh{0%{transform:translate(0,0)}25%{transform:translate(-2px,1px)}50%{transform:translate(2px,-1px)}75%{transform:translate(-1px,2px)}100%{transform:translate(1px,-1px)}}
.spark{position:absolute;width:7px;height:7px;border-radius:50%;background:radial-gradient(circle,#fff,#ffd23f 70%);pointer-events:none;animation:fly .5s ease-out forwards}
.debris{position:absolute;width:6px;height:6px;border-radius:2px;background:#b5712f;pointer-events:none;animation:fly .6s ease-out forwards}
@keyframes fly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(.4);opacity:0}}
button{background:#16a34a;border:0;color:#fff;padding:12px 20px;border-radius:10px;font-weight:700;font-size:16px}
#bar{width:180px;height:10px;background:#ffffff33;border-radius:6px;overflow:hidden}#prog{height:100%;width:0;background:#7bff9e}
small{opacity:.8;max-width:260px;text-align:center}</style></head><body>
<div id=scene><img id=cav class=tooth><img id=fill class=tooth></div>
<div id=bar><div id=prog></div></div>
<button id=drill>Hold to drill</button>
<small>hold to drill: sparks + debris fly, tooth judders, hard stutter-vibrate. cavity clears, then the filling drops in at 100%.</small>
