<!doctype html><html><head><meta charset=utf-8><style>
body{margin:0;background:#20242c;color:#e8e8ee;font-family:system-ui;display:flex;gap:16px;padding:14px;flex-wrap:wrap}
#stage{position:relative;width:360px;height:639px;border-radius:12px;overflow:hidden;flex:0 0 auto;box-shadow:0 6px 22px #0008}
#stage>img.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.ch{position:absolute;transform:translate(-50%,-50%);cursor:pointer;transition:filter .1s}
.ch.sel{filter:drop-shadow(0 0 0 #ffd23f) drop-shadow(0 0 6px #ffd23f)}
#panel{flex:1 1 280px;min-width:280px}
.row{margin:9px 0;display:flex;align-items:center;gap:10px}.row label{width:90px;font-size:13px;color:#b9c0cc}
input[type=range]{flex:1}output{width:48px;text-align:right;font-size:13px}
select,button{padding:7px 10px;border-radius:8px;border:0;font-weight:600}
button{background:#16a34a;color:#fff;cursor:pointer}pre{background:#161a20;padding:10px;border-radius:8px;font-size:12px;white-space:pre-wrap}
small{color:#8b94a2;font-size:12px}</style></head><body>
<div id=stage><img class=bg></div>
<div id=panel>
<h3 style="margin:2px 0 8px">Lobby seat tuner</h3>
<small>Click a character on the stage (or pick below), then drag its sliders. Yellow glow = selected.</small>
<div class=row><label>Character</label><select id=who></select></div>
<div class=row><label>X</label><input id=x type=range min=0 max=360><output id=xv></output></div>
<div class=row><label>Y</label><input id=y type=range min=0 max=639><output id=yv></output></div>
<div class=row><label>Scale</label><input id=s type=range min=0.2 max=1.2 step=0.01><output id=sv></output></div>
<button onclick=dump()>Copy all positions</button>
<pre id=out></pre>
</div>
