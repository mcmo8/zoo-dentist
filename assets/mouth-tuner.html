<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Zoo Smiles — mouth tuner v2</title>
<style>
 body{margin:0;background:#20242c;color:#e8e8ee;font-family:system-ui,sans-serif;display:flex;gap:18px;padding:16px;flex-wrap:wrap}
 #stage{position:relative;width:360px;height:560px;border-radius:14px;overflow:hidden;flex:0 0 auto;box-shadow:0 6px 24px #0008}
 #stage img{position:absolute}
 .lay{position:absolute;left:0;top:0;width:100%;height:100%}
 #teeth{position:absolute;left:0;top:0;width:100%;height:100%;z-index:2}
 #mouth{z-index:1}#gums{z-index:3}#bunny{z-index:0}#bgimg{z-index:0}
 .tooth{position:absolute;transform:translate(-50%,-50%)}
 #panel{flex:1 1 300px;min-width:300px}
 .row{margin:9px 0;display:flex;align-items:center;gap:10px}
 .row label{width:130px;font-size:13px;color:#b9c0cc}
 .row input[type=range]{flex:1}
 .row output{width:52px;text-align:right;font-variant-numeric:tabular-nums;font-size:13px}
 h2{font-size:15px;margin:4px 0 10px}.hint{font-size:12px;color:#8b94a2;margin:2px 0 10px}
 pre{background:#161a20;padding:12px;border-radius:8px;font-size:12px;white-space:pre-wrap}
 button{background:#16a34a;border:0;color:#fff;padding:8px 14px;border-radius:8px;font-weight:700;cursor:pointer}
</style></head><body>
<div id="stage">
 <img id="bgimg" class="lay" style="object-fit:cover">
 <img id="bunny" style="z-index:0">
 <img id="mouth">
 <div id="teeth"></div>
 <img id="gums">
</div>
<div id="panel">
 <h2>Mouth tuner v2 — independent row curves</h2>
 <p class="hint">Upper/Lower curve: positive = center tooth sits lower, negative = center sits higher. Match each row to its gum line so the middle tooth tucks.</p>
 <div class="row"><label>Upper row Y</label><input id="uy" type="range" min="120" max="380" value="314"><output id="uyv"></output></div>
 <div class="row"><label>Upper curve</label><input id="uc" type="range" min="-40" max="40" value="4"><output id="ucv"></output></div>
 <div class="row"><label>Lower row Y</label><input id="ly" type="range" min="240" max="520" value="406"><output id="lyv"></output></div>
 <div class="row"><label>Lower curve</label><input id="lc" type="range" min="-40" max="40" value="4"><output id="lcv"></output></div>
 <div class="row"><label>Tooth size</label><input id="sz" type="range" min="28" max="90" value="58"><output id="szv"></output></div>
 <div class="row"><label>Row span</label><input id="sp" type="range" min="0.30" max="0.85" step="0.01" value="0.61"><output id="spv"></output></div>
 <div class="row"><label>Mouth width</label><input id="mw" type="range" min="240" max="360" value="334"><output id="mwv"></output></div>
 <div class="row"><label>Mouth Y</label><input id="my" type="range" min="120" max="300" value="195"><output id="myv"></output></div>
 <button onclick="dump()">Copy current values</button>
 <pre id="out"></pre>
</div>

bgimg.src=D.bg;bunny.src=D.bunny;mouth.src=D.mouth;gums.src=D.gums;
const SW=360;
function tImg(src){const i=document.createElement('img');i.className='tooth';i.src=src;return i;}
let teeth=[];
function build(){teeth.forEach(t=>t.remove());teeth=[];
 for(let r=0;r<2;r++)for(let i=0;i<5;i++){const t=tImg(i===1&&r===0?D.cav:D.tooth);t.dataset.r=r;t.dataset.i=i;document.getElementById('teeth').appendChild(t);teeth.push(t);}}
function V(id){return +document.getElementById(id).value;}
function layout(){
 ['uy','uc','ly','lc','sz','sp','mw','my'].forEach(k=>document.getElementById(k+'v').textContent=document.getElementById(k).value);
 const mw=V('mw'),my=V('my'),mx=(SW-mw)/2;
 for(const im of [mouth,gums]){im.style.left=mx+'px';im.style.top=my+'px';im.style.width=mw+'px';im.style.height=mw+'px';}
 bunny.style.left=(SW/2-110)+'px';bunny.style.top='70px';bunny.style.width='220px';
 const cx=SW/2, span=mw*V('sp'), half=span/2, xs=[...Array(5)].map((_,i)=>cx-half+span*i/4);
 teeth.forEach(t=>{const r=+t.dataset.r,i=+t.dataset.i,x=xs[i],f=1-((x-cx)/half)**2;
   const baseY=r===0?V('uy'):V('ly'), curve=r===0?V('uc'):V('lc');
   t.style.left=x+'px';t.style.top=(baseY+curve*f)+'px';t.style.height=V('sz')+'px';
   t.style.transform='translate(-50%,-50%)'+(r===0?' scaleY(-1)':'');});
}
function dump(){const o={upperY:V('uy'),upperCurve:V('uc'),lowerY:V('ly'),lowerCurve:V('lc'),toothSize:V('sz'),span:V('sp'),mouthWidth:V('mw'),mouthY:V('my')};
 document.getElementById('out').textContent=JSON.stringify(o,null,2);}
['uy','uc','ly','lc','sz','sp','mw','my'].forEach(id=>document.getElementById(id).addEventListener('input',layout));
build();layout();
</script></body></html>
