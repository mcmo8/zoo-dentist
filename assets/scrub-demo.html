<!doctype html><html><head><meta charset=utf-8><style>
body{margin:0;background:#7a1030;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:system-ui;color:#fff;gap:18px}
#scene{position:relative;width:240px;height:240px}
#tooth{position:absolute;left:70px;top:60px;width:100px}
#germ{position:absolute;left:96px;top:70px;width:54px;transition:opacity .2s}
.bub{position:absolute;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff,#cdeffd 60%,rgba(180,230,255,.2));border:1px solid #ffffffaa;pointer-events:none;animation:rise 1s ease-out forwards}
@keyframes rise{0%{transform:translateY(0) scale(.4);opacity:0}20%{opacity:.95}100%{transform:translateY(-90px) scale(1);opacity:0}}
button{background:#16a34a;border:0;color:#fff;padding:12px 20px;border-radius:10px;font-weight:700;font-size:16px}
#bar{width:180px;height:10px;background:#ffffff33;border-radius:6px;overflow:hidden}#fill{height:100%;width:0;background:#7bff9e}
small{opacity:.8}</style></head><body>
